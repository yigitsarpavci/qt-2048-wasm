<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <!--Set visual viewport size for mobile devices to the device size,
        witch results in a scale of 1 and a 1:1 mapping between CSS pixels
        and Qt device independent pixels. -->
    <meta name="viewport" content="width=device-width, height=device-height, user-scalable=0"/>

    <title>2048</title>
    
  <link rel="stylesheet" href="style.css">
</head>
  <body onload="init()"><div id="game-container">
    <figure style="overflow:visible;" id="qtspinner">
      <center style="margin-top:1.5em; line-height:150%">
        <img src="qtlogo.svg" width="320" height="200" style="display:block"></img>
        <strong>Qt for WebAssembly: 2048</strong>
        <div id="qtstatus"></div>
        <noscript>JavaScript is disabled. Please enable JavaScript to use this application.</noscript>
      </center>
    </figure>
    <div id="screen" style="width:100%; height:100%;"></div>

    <script type="text/javascript">
        async function init()
        {
            const spinner = document.querySelector('#qtspinner');
            const screen = document.querySelector('#screen');
            const status = document.querySelector('#qtstatus');

            const showUi = (ui) => {
                [spinner, screen].forEach(element => element.style.display = 'none');
                if (screen === ui)
                    screen.style.position = 'default';
                ui.style.display = 'block';
            }

            try {
                showUi(spinner);
                status.innerHTML = 'Loading...';

                const instance = await qtLoad({
                    qt: {
                        onLoaded: () => showUi(screen),
                        onExit: exitData =>
                        {
                            status.innerHTML = 'Application exit';
                            status.innerHTML +=
                                exitData.code !== undefined ? ` with code ${exitData.code}` : '';
                            status.innerHTML +=
                                exitData.text !== undefined ? ` (${exitData.text})` : '';
                            showUi(spinner);
                        },
                        entryFunction: window.createQtAppInstance,
                        containerElements: [screen],
                        
                    }
                });
            } catch (e) {
                console.error(e);
                console.error(e.stack);
            }
        }
    </script>
    <script src="2048.js?v=7f5c2da"></script>
    <script type="text/javascript" src="qtloader.js?v=7f5c2da"></script>
  </div>
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Refocus canvas after any button/interactive element click
    document.addEventListener('click', function(e) {
        var btn = e.target.closest('button, [role="button"], input[type="button"]');
        if (btn) {
            setTimeout(function() {
                btn.blur();
                var c = document.querySelector('canvas');
                if (c) c.focus();
            }, 50);
        }
    }, true);

    // Clicking anywhere inside game-container should refocus canvas
    var gc = document.getElementById('game-container');
    if (gc) {
        gc.addEventListener('click', function() {
            setTimeout(function() {
                var c = document.querySelector('canvas');
                if (c) c.focus();
            }, 100);
        });
    }

    // Prevent arrow keys and space from scrolling or moving browser focus
    document.addEventListener('keydown', function(e) {
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space',' '].indexOf(e.key) !== -1) {
            e.preventDefault();
        }
    });
});
</script>
</body>
</html>
