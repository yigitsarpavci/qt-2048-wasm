<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <!--Set visual viewport size for mobile devices to the device size,
        witch results in a scale of 1 and a 1:1 mapping between CSS pixels
        and Qt device independent pixels. -->
    <meta name="viewport" content="width=device-width, height=device-height, user-scalable=0"/>

    <title>2048</title>
    
  <link rel="stylesheet" href="style.css">
</head>
  <body onload="init()"><div id="game-container">
    <figure style="overflow:visible;" id="qtspinner">
      <center style="margin-top:1.5em; line-height:150%">
        <img src="qtlogo.svg" width="320" height="200" style="display:block"></img>
        <strong>Qt for WebAssembly: 2048</strong>
        <div id="qtstatus"></div>
        <noscript>JavaScript is disabled. Please enable JavaScript to use this application.</noscript>
      </center>
    </figure>
    <div id="screen" style="width:100%; height:100%;"></div>

    <script type="text/javascript">
        async function init()
        {
            const spinner = document.querySelector('#qtspinner');
            const screen = document.querySelector('#screen');
            const status = document.querySelector('#qtstatus');

            const showUi = (ui) => {
                [spinner, screen].forEach(element => element.style.display = 'none');
                if (screen === ui)
                    screen.style.position = 'default';
                ui.style.display = 'block';
            }

            try {
                showUi(spinner);
                status.innerHTML = 'Loading...';

                const instance = await qtLoad({
                    qt: {
                        onLoaded: () => showUi(screen),
                        onExit: exitData =>
                        {
                            status.innerHTML = 'Application exit';
                            status.innerHTML +=
                                exitData.code !== undefined ? ` with code ${exitData.code}` : '';
                            status.innerHTML +=
                                exitData.text !== undefined ? ` (${exitData.text})` : '';
                            showUi(spinner);
                        },
                        entryFunction: window.createQtAppInstance,
                        containerElements: [screen],
                        
                    }
                });
            } catch (e) {
                console.error(e);
                console.error(e.stack);
            }
        }
    </script>
    <script src="2048.js?v=f5f2d93"></script>
    <script type="text/javascript" src="qtloader.js?v=f5f2d93"></script>
  </div>
<script>
(function() {
    // Robust canvas finder - searches regular DOM and shadow roots
    function findCanvas() {
        var c = document.querySelector('canvas');
        if (c) return c;
        // Search inside Qt's screen container and any shadow roots
        var screen = document.getElementById('screen');
        if (screen) {
            c = screen.querySelector('canvas');
            if (c) return c;
            // Check shadow roots
            var children = screen.querySelectorAll('*');
            for (var i = 0; i < children.length; i++) {
                if (children[i].shadowRoot) {
                    c = children[i].shadowRoot.querySelector('canvas');
                    if (c) return c;
                }
            }
        }
        // Last resort: search entire document for any canvas
        var allDivs = document.querySelectorAll('div');
        for (var j = 0; j < allDivs.length; j++) {
            if (allDivs[j].shadowRoot) {
                c = allDivs[j].shadowRoot.querySelector('canvas');
                if (c) return c;
            }
        }
        return null;
    }

    function refocusCanvas() {
        var c = findCanvas();
        if (c) {
            c.setAttribute('tabindex', '0');
            c.focus({preventScroll: true});
        }
    }

    window.addEventListener('load', function() {
        // Initial focus with retries (Qt may create canvas late)
        [300, 800, 1500, 3000].forEach(function(ms) {
            setTimeout(refocusCanvas, ms);
        });

        // ANY click/touch ANYWHERE on the page refocuses the canvas.
        // Using mousedown (fires before focus changes) on window to catch everything.
        window.addEventListener('mousedown', function() {
            setTimeout(refocusCanvas, 0);
            setTimeout(refocusCanvas, 50);
        }, true);

        window.addEventListener('touchstart', function() {
            setTimeout(refocusCanvas, 0);
            setTimeout(refocusCanvas, 50);
        }, true);

        // Nuclear fallback: if canvas doesn't have focus, forward key events to it.
        // This ensures gameplay keys ALWAYS work regardless of focus state.
        var gameKeys = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d','r','u','1','2','3'];
        window.addEventListener('keydown', function(e) {
            // Prevent default for arrow keys and space to stop page scrolling
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].indexOf(e.key) !== -1) {
                e.preventDefault();
            }
            // If a game key is pressed but canvas doesn't have focus, forward it
            var c = findCanvas();
            if (c && document.activeElement !== c && gameKeys.indexOf(e.key) !== -1) {
                c.focus({preventScroll: true});
                c.dispatchEvent(new KeyboardEvent('keydown', {
                    key: e.key, code: e.code, keyCode: e.keyCode,
                    bubbles: true, cancelable: true
                }));
            }
        }, true);

        // Neuter focus on Qt-generated accessibility overlays
        var observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(m) {
                m.addedNodes.forEach(function(node) {
                    if (node.nodeType === 1) {
                        if (node.getAttribute && node.getAttribute('role')) {
                            node.setAttribute('tabindex', '-1');
                        }
                        var children = node.querySelectorAll ? node.querySelectorAll('[role]') : [];
                        children.forEach(function(ch) { ch.setAttribute('tabindex', '-1'); });
                    }
                });
            });
        });
        observer.observe(document.body, { childList: true, subtree: true });

        document.querySelectorAll('[role]').forEach(function(el) {
            el.setAttribute('tabindex', '-1');
        });
    });
})();
</script>
</body>
</html>
